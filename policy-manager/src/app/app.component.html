@if (policies$ | async; as policies) {
  <input [formControl]="search" placeholder="Search policies" />
  @for (p of result$ | async; track p.number) {
    <app-policy-card
      [policyNumber]="p.number"
      [premium]="p.premium"
      [status]="p.status"
      (view)="onViewPolicy($event)"
      (renew)="onRenewPolicy($event)"
    ></app-policy-card>
  }
} @else {
  <p>Loading policies...</p>
}
